        <script>
            const t = document.getElementById("tokutaku");
            const con = document.getElementById("item-container")

            let x = 10;
            let y = 10;

            let targetX = x;
            let targetY = y;

            let playerSize = 10;

            let remainInfinityTime = 0;
            const infinityTime = 10;
            let moveSpeed = 2;
            const moveAcceleration = 5;
            function update(){
                if(x < targetX) x+=moveSpeed;
                if(x > targetX) x-=moveSpeed;

                if(y < targetY) y+=moveSpeed;
                if(y > targetY) y-=moveSpeed;

                t.style.left = x + "px";
                t.style.top = y + "px";
                remainInfinityTime--;

                for(let i=0; i<Object.keys(items).length; i++){
                    const item = items[i];
                    if(item.itemName == itemsID.enemy){
                        let thisX = item.x
                        let thisY = item.y
                        const mag = 0.5
                        if(thisX < x) thisX += moveSpeed*mag
                        if(thisX > x) thisX -= moveSpeed*mag
                        if(thisY < y) thisY += moveSpeed*mag
                        if(thisY > y) thisY -= moveSpeed*mag
                        item.x = thisX; 
                        item.y = thisY;
                        item.item.style.left = thisX + "px";
                        item.item.style.top = thisY + "px";
                    }
                    if(item.itemName == itemsID.shot){
                        let thisX = item.x
                        let thisY = item.y
                        const thisTargetX = item.targetX;
                        const thisTargetY = item.targetY;
                        const mag = 0.8
                        if(thisX < thisTargetX) thisX += moveSpeed*mag
                        if(thisX > thisTargetX) thisX -= moveSpeed*mag
                        if(thisY < thisTargetY) thisY += moveSpeed*mag
                        if(thisY > thisTargetY) thisY -= moveSpeed*mag
                        const itemDOM = item.item
                        if(thisX === thisTargetX || thisY === thisTargetY){
                            itemDOM.remove()
                            items.splice(i,1);
                            generate(itemsID.enemy)
                        }
                    }

                    const itemDOM = item.item
                    if(isOverlap(t, itemDOM)){
                        switch(itemDOM.className.split(" ").find( c => c != "item")){
                            case itemsID.star:
                                remainInfinityTime = infinityTime*60;
                                itemDOM.remove()
                                generate(itemsID.star);
                                playerSize += 1;
                                t.style.width = playerSize*10 + "px"
                                moveSpeed += moveAcceleration;
                                moveStep += moveAcceleration;
                                moveMax += moveAcceleration;
                                break;
                            case itemsID.enemy:
                                if(remainInfinityTime>0){
                                    itemDOM.remove()
                                    items.splice(i,1);
                                    generate(itemsID.enemy)
                                } 
                                else playerSize --;
                                break;  
                            //default:
                            //    console.log(item.className.split(" ").filter( c => c != "item"))
                        }
                    }
                }

                if(remainInfinityTime>0) VFX()
                else t.style.width = playerSize;
                requestAnimationFrame(update) 
            };
            requestAnimationFrame(update)

            function VFX(){
                t.style.filter = `hue-rotate(${remainInfinityTime*1.02}deg)`;
                t.style.width = `${playerSize*10 + Math.random()*10}px`
            }

            function isOverlap(a, b){
                const rectA = a.getBoundingClientRect();
                const rectB = b.getBoundingClientRect();

                return !(
                    rectA.right < rectB.left ||
                    rectA.left > rectB.right ||
                    rectA.bottom < rectB.top ||
                    rectA.top > rectB.bottom
                );
            }

            let moveStep = 30;
            let moveMax = 30;
            window.addEventListener("keydown", e => {
                switch(e.key){
                    case "w":
                        targetY = Math.max(0, Math.max(targetY - moveStep, y - moveMax));
                        break;
                    case "s":
                        targetY = Math.min(window.innerHeight - t.offsetHeight,
                                        Math.min(targetY + moveStep, y + moveMax));
                        break;
                    case "a":
                        targetX = Math.max(0,
                                        Math.max(targetX - moveStep, x - moveMax));
                        break;
                    case "d":
                        targetX = Math.min(window.innerWidth - t.offsetWidth,
                                        Math.min(targetX + moveStep, x + moveMax));
                        break;
                    case "ArrowRight":
                        
                        break;
                    case "ArrowLeft":
                        
                        break;
                    case "ArrowDown":
                        
                        break;
                    case "ArrowUp":
                        
                        break;

                }
            });
            const itemsID = {
                "star" : "star",
                "enemy" : "enemy",
                "shot" : "teppeki"
            }
            const itemsURL = {
                [itemsID.star] : "https://stockmaterial.net/wp/wp-content/uploads/img/view_star01_01.png",
                [itemsID.enemy] : "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRo9qCeM3PxnYkynoiZMtBtcaTR2rDTgTIV6JQMeSdd-A&s=10",
                [itemsID.shot] : "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2jZ6qochLFX1yWdj1y7bCd4qpiBXUSEXCMRoaA5wHPQ&s=10"
            }

            const items = []
            function generate(itemID,x=Math.random()*window.innerWidth,y=Math.random()*window.innerHeight){
                const item = document.createElement("img");
                item.style.position = "absolute";
                item.src = itemsURL[itemID];
                item.style.width = "50px"
                item.style.left = x + "px";
                item.style.top = y + "px";
                item.classList.add(itemID,"item");
                con.appendChild(item);
                
                items.push({
                    "itemName" : itemID,
                    "x" : x,
                    "y" : y,
                    "item" : item
                })

            }
            for(let i=0; i<5; i++){
                generate(itemsID.star)
                generate(itemsID.enemy)
            }
            function shot_teppeki(x,y,direction){
                const item = document.createElement("img");
                item.style.position = "absolute";
                item.src = itemsURL[itemsID.shot];
                item.style.width = "auto";
                item.style.left = x + "px";
                item.style.top = y + "px";
                item.classList.add(itemID,"item");
                con.appendChild(item);
                let thisTargetX = x;
                let thisTargetY = y;
                const con = 50;
                switch(direction){
                    case "right":
                        thisTargetX = Math.min(window.innerHeight, x+50);
                        break;
                    case "left":
                        thisTargetX = Math.max(0, x-con);
                        break;
                    case "down":
                        thisTargetY = Math.min(window.innerWidth, y+con);
                    case "":
                        thisTargetY = Math.max(0, y-con)
                        break;
                }

                items.push({
                    "itemName" : itemsID.shot,
                    "x" : x,
                    "y" : y,
                    "targetX" : thisTargetX,
                    "targetY" : thisTargetY,
                    "item" : item
                })
            }

        </script>
        <style>
            #tokutaku{
                position: absolute;
                left: 10px;
            }
        </style>
    </body>
